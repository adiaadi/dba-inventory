<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DBA Inventory{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg app-nav border-bottom sticky-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <span class="brand-mark"><i class="bi bi-database"></i></span>
        <span>DBA Inventory</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/">
              <i class="bi bi-speedometer2"></i> Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_page == 'hosts' %}active{% endif %}" href="/hosts">
              <i class="bi bi-hdd-network"></i> Hosts
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_page == 'databases' %}active{% endif %}" href="/databases">
              <i class="bi bi-database-check"></i> Databases
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if active_page == 'clusters' %}active{% endif %}" href="/clusters">
              <i class="bi bi-diagram-3"></i> Clusters
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container-fluid px-4 py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
