services:
  db:
    image: postgres:16
    container_name: dba_inventory_db
    environment:
      POSTGRES_DB: dba_inventory
      POSTGRES_USER: dba_inventory
      POSTGRES_PASSWORD: dba_inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dba_inventory -d dba_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: dba_inventory_app
    environment:
      DATABASE_URL: postgresql+psycopg://dba_inventory:dba_inventory@db:5432/dba_inventory
      APP_NAME: DBA Inventory
      APP_ENV: docker
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Almaty}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-admin-session-secret}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ZABBIX_URL: ${ZABBIX_URL:-}
      ZABBIX_API_TOKEN: ${ZABBIX_API_TOKEN:-}
      ZABBIX_VERIFY_SSL: ${ZABBIX_VERIFY_SSL:-true}
      ZABBIX_CA_FILE: ${ZABBIX_CA_FILE:-}
      ZABBIX_AUTO_REFRESH_SECONDS: ${ZABBIX_AUTO_REFRESH_SECONDS:-300}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
